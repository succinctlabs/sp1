[package]
name = "slop-veil"
description = "Verifiable Encapsulation of Interactive proofs with Low overhead"
readme = "README.md"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
slop-challenger = { workspace = true }
slop-alloc = { workspace = true }
slop-algebra = { workspace = true }
slop-koala-bear = { workspace = true }
slop-symmetric = { workspace = true }
slop-multilinear = { workspace = true }
slop-matrix = { workspace = true }
slop-dft = { workspace = true }
slop-commit = { workspace = true }
slop-merkle-tree = { workspace = true }
slop-tensor = { workspace = true }
slop-stacked = { workspace = true }
slop-basefold = { workspace = true }
slop-basefold-prover = { workspace = true }
slop-futures = { workspace = true }
slop-sumcheck = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }
itertools = { workspace = true }
futures = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
derive-where = { workspace = true }
bincode = { workspace = true }
slop-utils = { workspace = true }

[dev-dependencies]
rand_chacha = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
slop-poseidon2 = { workspace = true }
slop-jagged = { workspace = true }
# Benchmark-only: enables p3-maybe-rayon's `parallel` feature (via the workspace dep, which sets it)
# for slop-veil's own example/test/bench builds, so the CPU dot-product sweep can run multi-core.
# The p3 DFT (encode) and p3-merkle-tree (commit) both gate their rayon on this feature; without it
# they fall back to a single thread. As a dev-dependency it does NOT affect downstream SP1 builds.
p3-maybe-rayon = { workspace = true }

[[example]]
name = "benchmark_sweep"
path = "benchmarking/benchmark_sweep.rs"

[[example]]
name = "hadamard_benchmark_sweep"
path = "benchmarking/hadamard_benchmark_sweep.rs"

[[example]]
name = "dot_product_sweep"
path = "benchmarking/dot_product_sweep.rs"

[[test]]
name = "benchmarking_tests"
path = "benchmarking/benchmarking_tests.rs"

[features]
default = []

[lints]
workspace = true
