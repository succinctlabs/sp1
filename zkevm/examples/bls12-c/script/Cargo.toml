[package]
name = "bls12-c-script"
description = "Host driver for bls12-c. Cross-checks the guest's BLS12-381 G1/G2 add and pairing-check outputs against host-side bls12_381 computations."
version = { workspace = true }
edition = { workspace = true }
publish = false

[[bin]]
name = "bls12-c-execute"
path = "src/execute.rs"

[[bin]]
name = "bls12-c-prove"
path = "src/prove.rs"

[dependencies]
sp1-sdk = { workspace = true }
bls12_381 = { version = "0.8", default-features = false, features = ["groups", "pairings", "alloc"] }
ff = { version = "0.13", default-features = false }
group = { version = "0.13", default-features = false }
rand = "0.8"
tokio = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
zkevm-c-build = { path = "../../c-build" }
