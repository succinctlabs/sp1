[package]
name = "kzg-c-script"
description = "Host driver for kzg-c. Feeds an EIP-4844 KZG opening to the guest and asserts the verifier accepts a valid proof and rejects a tampered one."
version = { workspace = true }
edition = { workspace = true }
publish = false

[[bin]]
name = "kzg-c-execute"
path = "src/execute.rs"

[[bin]]
name = "kzg-c-prove"
path = "src/prove.rs"

[dependencies]
sp1-sdk = { workspace = true }
zkevm-fixtures = { path = "../../fixtures" }
hex = "0.4"
tokio = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
zkevm-c-build = { path = "../../c-build" }
