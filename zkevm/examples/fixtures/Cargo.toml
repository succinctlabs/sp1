[package]
name = "zkevm-fixtures"
description = "Vendored cryptographic test vectors (consensus-specs KZG, Wycheproof ECDSA, EIP-152 BLAKE2f) used by libzkevm's host-side example drivers for differential testing of `zkvm_*` precompile outputs."
version = { workspace = true }
edition = { workspace = true }
publish = false

[dependencies]
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
