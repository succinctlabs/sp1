[package]
name = "assert-c-script"
description = "Host driver for assert-c. Runs both the success path (flag=0) and the failed-assert path (flag=1)."
version = { workspace = true }
edition = { workspace = true }
publish = false

[[bin]]
name = "assert-c-execute"
path = "src/execute.rs"

[[bin]]
name = "assert-c-prove"
path = "src/prove.rs"

[dependencies]
sp1-sdk = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
zkevm-c-build = { path = "../../c-build" }
