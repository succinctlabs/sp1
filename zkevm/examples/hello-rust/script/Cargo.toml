[package]
name = "hello-rust-script"
description = "Host-side script: builds the hello-rust C-ABI guest, executes it under SP1 (with optional proving), and verifies the public output matches the input."
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }
rust-version = { workspace = true }
publish = false

[[bin]]
name = "hello-rust-execute"
path = "src/execute.rs"

[[bin]]
name = "hello-rust-prove"
path = "src/prove.rs"

[dependencies]
sp1-sdk = { workspace = true }
# Workspace tokio has `default-features = false`; we need rt + macros for `#[tokio::main]`.
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }

[build-dependencies]
sp1-build = { workspace = true }

[lints]
workspace = true
