[package]
name = "sha256"
version = "0.0.1"
edition = "2021"
publish = false
description = "SHA-256 precompile demo: reads bytes, hashes via libzkevm's `zkvm_sha256`, writes the 32-byte digest. Mirror of `examples/keccak/`."

[[bin]]
name = "sha256"
path = "src/main.rs"

[dependencies]
libzkevm = { path = "../../../libzkevm" }

[profile.release]
panic = "abort"
opt-level = 3
lto = true
codegen-units = 1
debug = false
strip = true

[profile.dev]
panic = "abort"

[workspace]
