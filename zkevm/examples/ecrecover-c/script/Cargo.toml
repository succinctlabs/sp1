[package]
name = "ecrecover-c-script"
description = "Host driver for ecrecover-c. Signs a message, sends (msg||sig||recid) to the guest, and asserts the recovered pubkey matches the signing key."
version = { workspace = true }
edition = { workspace = true }
publish = false

[[bin]]
name = "ecrecover-c-execute"
path = "src/execute.rs"

[[bin]]
name = "ecrecover-c-prove"
path = "src/prove.rs"

[dependencies]
sp1-sdk = { workspace = true }
zkevm-fixtures = { path = "../../fixtures" }
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "std"] }
sha2 = { version = "0.10", default-features = false }
rand = "0.8"
tokio = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
zkevm-c-build = { path = "../../c-build" }
