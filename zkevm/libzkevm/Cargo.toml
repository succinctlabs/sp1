[package]
name = "libzkevm"
description = "SP1 platform SDK implementing the eth-act/zkvm-standards C ABI for non-Rust guest programs (scaffolding only). The C-ABI staticlib lives in `../libzkevm-cabi`; this crate is the rlib that holds the actual implementations."
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }
rust-version = { workspace = true }
publish = false

[lib]
name = "zkevm"
# rlib only. The staticlib (libzkevm.a) is produced by the sibling
# `libzkevm-cabi` crate, which lives in a separate workspace so it can set
# `panic = "abort"` (required for `#![no_std]` staticlibs, and not
# expressible per-package in cargo).
crate-type = ["rlib"]

[dependencies]
# Reuse SP1's no_std runtime. With default-features = false we drop the
# `lib` (sp1-lib) and `libm` defaults; we still get the syscall number
# constants and the high-level `syscall_halt`/`syscall_write`/`syscall_hint_*`
# wrappers.
sp1-zkvm = { workspace = true, default-features = false }

# SP1's patched `tiny-keccak`. The `patch-2.0.2-sp1-6.2.0-pre` tag points
# `sp1-lib` at the `tamir/no_std_zkvm` branch on succinctlabs/sp1 (the
# pre-merge home of the no_std refactor); when 6.2.0 ships we'll cut
# `patch-2.0.2-sp1-6.2.0` against `sp1-lib = "6.2.0"` from crates.io and
# repoint here.
#
# At `target_os = "zkvm"`, the inner keccakf permutation routes to SP1's
# `KECCAK_PERMUTE` syscall via `sp1_lib::syscall_keccak_permute`; on host
# it falls back to the stock software implementation. Used by
# `precompile::hash::zkvm_keccak256`.
tiny-keccak = { git = "https://github.com/sp1-patches/tiny-keccak", tag = "patch-2.0.2-sp1-6.2.0-pre", features = ["keccak"] }

# SP1's patched `sha2`. Unlike tiny-keccak this patch declares the
# syscall extern symbols directly (no `sp1-lib` dep) so the
# `-sp1-6.2.0-pre` tag is just an alias of `-sp1-6.0.0`. At
# `target_os = "zkvm"` the inner `compress256` calls
# `syscall_sha256_extend` + `syscall_sha256_compress`. Used by
# `precompile::hash::zkvm_sha256`. `default-features = false` drops the
# `std` feature so libzkevm stays no_std-clean.
sha2 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha2-0.10.9-sp1-6.2.0-pre", default-features = false }

# RIPEMD-160. No SP1 syscall and not on the L1 STF hot path, so we use the
# stock RustCrypto `ripemd` crate as a software implementation. Used by
# `precompile::hash::zkvm_ripemd160`. `default-features = false` keeps it
# no_std-clean.
ripemd = { version = "0.1", default-features = false }

[lints]
workspace = true
