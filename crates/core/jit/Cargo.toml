[package]
name = "sp1-jit"
description = "JIT compilation for SP1 trace generation"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
dynasmrt = { workspace = true }
memfd = { workspace = true }
serde = { workspace = true, features = ["derive"]}
tracing.workspace = true
uuid = { workspace = true, features = ["v4"] }
hashbrown = { workspace = true }
memmap2 = { workspace = true }
libc = { workspace = true }
bincode = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
profiling = []
## Enables loading the JIT code and metadata from statically linked symbols
## produced by assembling the `.S` file emitted by `CompiledCode::write_asm`.
## When this feature is active, `JitFunction::from_static_link` and
## `MinimalExecutor::from_static_link` become available.
static-link = []

[lints]
workspace = true
